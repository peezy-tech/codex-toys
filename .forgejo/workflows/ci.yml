name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: bun
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check:types

      - name: Test
        run: bun run test

      - name: Release check
        run: bun run --filter @peezy.tech/codex-flows release:check
