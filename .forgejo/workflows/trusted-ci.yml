name: trusted-ci

on:
  pull_request_target:
    branches:
      - main
    types:
      - labeled

jobs:
  check:
    if: github.event.label.name == 'ci:run-full'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted CI helpers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Consume full CI label
        run: node scripts/ci/consume-pr-label.mjs ci:run-full

      - name: Checkout approved PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install VitePlus
        run: npm install -g vite-plus@0.1.22

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Typecheck
        run: vp run check:types

      - name: Test
        run: vp run test

      - name: Release check
        run: vp run release:check
