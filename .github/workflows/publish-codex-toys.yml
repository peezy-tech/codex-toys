name: Publish codex-toys

on:
  workflow_dispatch:
    inputs:
      confirm_package:
        description: "Type codex-toys"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: inputs.confirm_package == 'codex-toys'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup VitePlus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Update npm
        run: npm install -g npm@^11.10.0

      - name: Install pnpm
        run: npm install -g pnpm@11.1.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup npm publishing
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Release check
        run: vp run release:check

      - name: Publish codex-toys
        run: |
          package_dir=packages/codex-toys
          name=$(node -p "require('./${package_dir}/package.json').name")
          version=$(node -p "require('./${package_dir}/package.json').version")
          spec="${name}@${version}"

          if npm view "$spec" version --json >/dev/null 2>&1; then
            echo "$spec is already published"
            exit 0
          fi

          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          pnpm exec tsx scripts/pack-public-package.ts --pack-destination "$tmpdir"
          tarball=$(find "$tmpdir" -maxdepth 1 -name '*.tgz' -print -quit)
          npm publish "$tarball" --access public --provenance
