name: Publish @peezy-tech/codex-flows

on:
  workflow_dispatch:
    inputs:
      confirm_package:
        description: "Type @peezy-tech/codex-flows to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: inputs.confirm_package == '@peezy-tech/codex-flows'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release check
        run: bun run --filter @peezy-tech/codex-flows release:check

      - name: Publish
        working-directory: packages/codex-client
        run: npm publish --access public
