name: Publish codex-flow packages

on:
  workflow_dispatch:
    inputs:
      confirm_package:
        description: "Type a package name to publish, or publish-codex-flow-packages for all"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: inputs.confirm_package == 'publish-codex-flow-packages' || inputs.confirm_package == '@peezy.tech/codex-flows' || inputs.confirm_package == '@peezy.tech/codex-discord-bridge' || inputs.confirm_package == '@peezy.tech/codex-workspace-voice-gateway' || inputs.confirm_package == '@peezy.tech/flow-runtime' || inputs.confirm_package == '@peezy.tech/flow-backend-convex'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup VitePlus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Setup npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Release check
        run: vp run release:check

      - name: Publish @peezy.tech/codex-flows
        if: inputs.confirm_package == 'publish-codex-flow-packages' || inputs.confirm_package == '@peezy.tech/codex-flows'
        working-directory: packages/codex-client
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@peezy.tech/codex-flows@$version" version --json >/dev/null 2>&1; then
            echo "@peezy.tech/codex-flows@$version is already published"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @peezy.tech/codex-discord-bridge
        if: inputs.confirm_package == 'publish-codex-flow-packages' || inputs.confirm_package == '@peezy.tech/codex-discord-bridge'
        working-directory: apps/discord-bridge
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@peezy.tech/codex-discord-bridge@$version" version --json >/dev/null 2>&1; then
            echo "@peezy.tech/codex-discord-bridge@$version is already published"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @peezy.tech/codex-workspace-voice-gateway
        if: inputs.confirm_package == 'publish-codex-flow-packages' || inputs.confirm_package == '@peezy.tech/codex-workspace-voice-gateway'
        working-directory: apps/workspace-voice-gateway
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@peezy.tech/codex-workspace-voice-gateway@$version" version --json >/dev/null 2>&1; then
            echo "@peezy.tech/codex-workspace-voice-gateway@$version is already published"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @peezy.tech/flow-runtime
        if: inputs.confirm_package == 'publish-codex-flow-packages' || inputs.confirm_package == '@peezy.tech/flow-runtime'
        working-directory: packages/flow-runtime
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@peezy.tech/flow-runtime@$version" version --json >/dev/null 2>&1; then
            echo "@peezy.tech/flow-runtime@$version is already published"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @peezy.tech/flow-backend-convex
        if: inputs.confirm_package == 'publish-codex-flow-packages' || inputs.confirm_package == '@peezy.tech/flow-backend-convex'
        working-directory: packages/flow-backend-convex
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@peezy.tech/flow-backend-convex@$version" version --json >/dev/null 2>&1; then
            echo "@peezy.tech/flow-backend-convex@$version is already published"
          else
            npm publish --access public --provenance
          fi
